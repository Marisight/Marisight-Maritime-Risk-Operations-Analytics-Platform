services:
  seismic-ingestion:
    build: .
    container_name: seismic_streamer
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - .:/app
    depends_on:
      - postgres_db
    restart: always
    networks:                    
      - marisight_net            

  postgres_db:
    image: postgres:15
    container_name: postgres_container
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=seismic_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    command: >                              
      postgres                             
      -c wal_level=logical                 
      -c max_replication_slots=5           
      -c max_wal_senders=5                 
    networks:                    
      - marisight_net            

volumes:
  postgres_data:
    external: true
    name: python-websocket_postgres_data  

networks:                        
  marisight_net:                 
    external: true               
