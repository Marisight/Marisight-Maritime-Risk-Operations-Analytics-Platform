# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'marisight_dbt'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'marisight_dbt'

# These configurations specify where dbt should look for different types of files.
# You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this config, I tell dbt to build all models as tables or views according to what I specify withing each schema
models:
  marisight_dbt:
    silver:
      +schema: SILVER
      +materialized: table        # default for silver (covers ports)
      silver_vessels:
        +materialized: incremental  # override for vessels only
        
    gold:
      +schema: GOLD
      +materialized: table