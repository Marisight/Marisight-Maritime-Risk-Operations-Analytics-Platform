version: 2

sources:
  - name: bronze                          # [REQUIRED] The logical nickname for dbt
    description: "Raw data from the DBO schema in Snowflake — ingested via S3 stage"
    database: PROJECT_DB                  # Physical Database name
    schema: DBO                           # Physical Schema name

    

    # ------------------- OVERRIDES & QUOTING -------------------
    quoting:
      database: false     # No double quotes: "PROJECT_DB"
      schema: false       # No quotes: DBO
      identifier: false   # No double quotes on table names
      
    # ------------------- THE TABLES -------------------
    tables:
      - name: VESSEL
        description: >
          Raw vessel records scraped daily. All columns are VARCHAR.
        config:
          loaded_at_field: "TRY_TO_TIMESTAMP(REPORT_DATE)"
          freshness:
            warn_after:  { count: 25, period: hour }
            error_after: { count: 49, period: hour }

      - name: PORTS     
        description:  >
          World Port Index data — 3,804 ports. Loaded monthly.
          109 columns covering geography, depth, facilities, and services.

      - name: SEISMIC_EVENTS
        description: "Real-time seismic events from EMSC via Kafka/Debezium CDC pipeline. Contains CDC fields (__DELETED, ACTION) and Kafka metadata (RECORD_METADATA) dropped at Silver."
        identifier: '"marisight.public.seismic_events"'

