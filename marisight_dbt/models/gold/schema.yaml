  - name: dim_date
    description: "Standard calendar dimension to support time-based analysis."
    columns:
      - name: DATE_SK
        description: "Surrogate key (YYYYMMDD)."
        tests:
          - unique
          - not_null

  - name: fact_vessel_voyage
    description: >
      One row per vessel per report_date.
    columns:
      - name: VOYAGE_SK
        tests: [unique, not_null]
      - name: DESTINATION_PORT_SK
        tests:
          - relationships:
              to: ref('dim_port')
              field: PORT_SK
      - name: DATE_SK
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: DATE_SK

  - name: fact_daily_seismic
    description: >
      One row per (event_date × region).
    columns:
      - name: DAILY_SEISMIC_SK
        tests: [unique, not_null]
      - name: DATE_SK
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: DATE_SK