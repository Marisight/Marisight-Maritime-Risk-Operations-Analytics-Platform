version: 2

models:
  - name: silver_vessels
    description: >
      Cleaned and standardised vessel records from DBO.VESSEL (daily scrape).
      Numeric/date casting, null normalisation, coordinate validity flag, and
      deduplication to one row per vessel per report date.
    columns:
      - name: NAME
        description: "Vessel name (trimmed). Not null."
        tests:
          - not_null
      - name: REPORT_DATE
        description: "Date the record was scraped (parsed from 'YYYY-MM-DD HH24:MI')."
        tests:
          - not_null
      - name: IS_VALID_COORDINATES
        description: "TRUE when destination lat/lon are present and within valid ranges."
      - name: REPORTED_STATUS
        description: "Navigation status; noise values ('None','-') normalised to NULL."
      - name: DEPARTURE_DATE
        description: "Parsed ATD (Actual Time of Departure) as DATE. NULL when scraper shows no ATD."
      - name: ACTUAL_ARRIVAL_DATE
        description: "Parsed ATA (Actual Time of Arrival) as DATE. NULL when no ATA present."
      - name: ESTIMATED_ARRIVAL_DATE
        description: "Parsed ETA as DATE. Forward-resolved: year+1 applied for year-end crossovers."
      - name: IS_TEMPORAL_ANOMALY
        description: "TRUE when ACTUAL_ARRIVAL_DATE < DEPARTURE_DATE (date-grain check)."
      - name: IS_MISSING_TIMES
        description: "TRUE when all three date fields (ATD, ATA, ETA) are NULL."
      - name: _INGESTED_AT
        description: "Pipeline ingestion timestamp from Bronze. Used as incremental watermark."



  - name: silver_ports
    description: >
      Cleaned and standardised port records from DBO.PORTS (NGA World Port Index,
      monthly load). 57 analytically useful columns; categoricals normalised
      ('Unknown'/blank/'-'/'N/A' -> NULL); 0-sentinel depths/dimensions converted
      to NULL; coordinate validity flag added; deduplicated to one row per port.
    columns:
      - name: WORLD_PORT_INDEX_NUMBER
        tests:
          - unique
          - not_null
      - name: MAIN_PORT_NAME
        description: "Primary port name."
      - name: LATITUDE
        description: "Decimal degrees latitude."
      - name: LONGITUDE
        description: "Decimal degrees longitude."
      - name: IS_VALID_COORDINATES
        description: "TRUE when lat in [-90,90] and lon in [-180,180]."
      - name: HARBOR_SIZE
        tests:
          - accepted_values:
              values: ['Very Small', 'Small', 'Medium', 'Large']
              config:
                severity: warn
      - name: CHANNEL_DEPTH_M
        description: "Channel depth in metres; 0-sentinel converted to NULL."
      - name: MAXIMUM_VESSEL_DRAFT_M
        description: "Maximum vessel draft permitted; 0-sentinel converted to NULL."
      - name: MAXIMUM_VESSEL_LENGTH_M
        description: "Maximum vessel length permitted; 0-sentinel converted to NULL."
      - name: MAXIMUM_VESSEL_BEAM_M
        description: "Maximum vessel beam permitted; 0-sentinel converted to NULL."
      - name: LOADED_AT
        description: "Timestamp when dbt wrote this row to Silver."

  - name: silver_seismic_events
    description: >
      Cleaned seismic events from EMSC via Kafka/Debezium CDC pipeline.
      LATITUDE, LONGITUDE, MAGNITUDE, DEPTH_KM cast to FLOAT (integer precision only — lost at ingestion).
      Deduplicated on EVENT_ID; incremental watermark on LAST_UPDATED_AT.
      EVENT_TYPE and MAGNITUDE_TYPE carry both raw code and human-readable label.
    columns:
      - name: EVENT_ID
        description: "EMSC global unique event identifier (UNID). e.g. '20260511_0000306'."
        tests:
          - not_null
          - unique:
              config:
                severity: warn
      - name: SOURCE_ID
        description: "Agency-local numeric identifier. e.g. '1993353'."
      - name: REGION
        description: "Geographic region from EMSC Flynn region catalog. e.g. 'OFF COAST OF COSTA RICA'."
      - name: REPORTING_AGENCY
        description: "Agency that reported the event. e.g. 'NEIC', 'BMKG', 'ETHZ'."
      - name: EVENT_TYPE_CODE
        description: "Raw EMSC event type code. e.g. 'ke', 'se'."
      - name: EVENT_TYPE
        description: "Human-readable event type. e.g. 'Confirmed Earthquake', 'Suspected Earthquake'."
      - name: MAGNITUDE_TYPE_CODE
        description: "Raw magnitude scale code. e.g. 'ml', 'mw', 'mb'."
      - name: MAGNITUDE_TYPE
        description: "Human-readable magnitude scale. e.g. 'Local Magnitude', 'Moment Magnitude'."
      - name: LATITUDE
        description: "Epicenter latitude as FLOAT (integer precision — decimal lost at ingestion)."
      - name: LONGITUDE
        description: "Epicenter longitude as FLOAT (integer precision — decimal lost at ingestion)."
      - name: MAGNITUDE
        description: "Earthquake magnitude as FLOAT (integer precision — connector limitation)."
      - name: DEPTH_KM
        description: "Hypocenter depth in kilometres as FLOAT (integer precision)."
      - name: EARTHQUAKE_TIME
        description: "Actual earthquake occurrence time (UTC)."
        tests:
          - not_null
      - name: LAST_UPDATED_AT
        description: "Timestamp of the most recent EMSC update to this event. Used as incremental watermark."
      - name: LOADED_AT
        description: "UTC timestamp when dbt wrote this row to Silver."
