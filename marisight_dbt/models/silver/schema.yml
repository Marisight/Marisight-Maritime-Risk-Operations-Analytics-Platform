- name: silver_seismic_events
    description: >
      Cleaned seismic events from EMSC via Kafka/Debezium CDC pipeline.
      LATITUDE, LONGITUDE, MAGNITUDE, DEPTH_KM cast to FLOAT (integer precision only — lost at ingestion).
      Deduplicated on EVENT_ID; incremental on EARTHQUAKE_TIME.
    columns:
      - name: EVENT_ID
        description: "EMSC global unique event identifier (UNID)."
        tests:
          - unique
          - not_null
      - name: EVENT_TYPE
        description: "EMSC event classification: 'ke' = confirmed earthquake, 'se' = suspected."
      - name: MAGNITUDE_TYPE
        description: "Magnitude scale used: 'ml' = local, 'mw' = moment, 'm' = generic."
      - name: MAGNITUDE
        description: "Earthquake magnitude (integer precision — connector limitation)."
      - name: DEPTH_KM
        description: "Hypocenter depth in kilometres (integer precision)."
      - name: LATITUDE
        description: "Epicenter latitude (integer precision — decimal lost at ingestion)."
      - name: LONGITUDE
        description: "Epicenter longitude (integer precision — decimal lost at ingestion)."
      - name: REGION
        description: "Geographic region name from EMSC Flynn region catalog."
      - name: REPORTING_AGENCY
        description: "Agency that reported the event: e.g. NEIC, ETHZ, INET."
      - name: EARTHQUAKE_TIME
        description: "Actual earthquake occurrence time (UTC)."
        tests:
          - not_null
      - name: LAST_UPDATED_AT
        description: "Timestamp of the most recent EMSC update to this event."
      - name: LOADED_AT
        description: "Timestamp when dbt wrote this row to Silver."
